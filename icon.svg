<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#050505"/>
  <!-- Watch circle -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#C9A15B" stroke-width="8"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#C9A15B" stroke-width="2" opacity="0.4"/>
  <!-- Watch crown -->
  <rect x="400" y="234" width="28" height="44" rx="4" fill="#C9A15B"/>
  <!-- Hour markers -->
  <line x1="256" y1="106" x2="256" y2="126" stroke="#C9A15B" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="386" x2="256" y2="406" stroke="#C9A15B" stroke-width="6" stroke-linecap="round"/>
  <line x1="106" y1="256" x2="126" y2="256" stroke="#C9A15B" stroke-width="6" stroke-linecap="round"/>
  <line x1="386" y1="256" x2="400" y2="256" stroke="#C9A15B" stroke-width="6" stroke-linecap="round"/>
  <!-- Hour & minute hands -->
  <line x1="256" y1="256" x2="256" y2="160" stroke="#C9A15B" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="310" y2="280" stroke="#C9A15B" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="7" fill="#C9A15B"/>
  <!-- A letter -->
  <text x="256" y="360" text-anchor="middle" font-family="Georgia,serif" font-size="48" font-weight="400" fill="#C9A15B" letter-spacing="8">AUREX</text>
</svg>
